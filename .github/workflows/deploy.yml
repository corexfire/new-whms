name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push to GHCR
        uses: docker/build-push-action@v4
        with:
          context: whms-backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/whms-backend:latest
            ghcr.io/${{ github.repository_owner }}/whms-backend:${{ github.run_number }}
          dockerfile: whms-backend/Dockerfile
      - name: Optional: Login to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/build-push-action@v4
        with:
          context: whms-backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/whms-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/whms-backend:${{ github.run_number }}
          dockerfile: whms-backend/Dockerfile
